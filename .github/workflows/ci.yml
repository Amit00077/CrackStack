name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt
      - run: pip install -r requirements/dev.txt
      - run: ruff check .
      - run: mypy app --ignore-missing-imports

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prepos
          POSTGRES_PASSWORD: prepos
          POSTGRES_DB: prepos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt
      - run: pip install -r requirements/dev.txt
      - run: pytest --cov=app --cov-report=xml -v
        env:
          DATABASE_URL: postgresql+asyncpg://prepos:prepos@localhost:5432/prepos_test
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: "false"
      - uses: codecov/codecov-action@v4

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy stub
        run: echo "Deployment step - replace with actual deploy logic"
