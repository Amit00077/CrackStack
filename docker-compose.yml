services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prepos
      POSTGRES_PASSWORD: prepos
      POSTGRES_DB: prepos
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prepos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prepos-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prepos-network

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_SERVER: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prepos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - prepos-network

volumes:
  postgres_data:
  redis_data:

networks:
  prepos-network:
    driver: bridge
